spring.application.name=ms-03-auth-service

# Puerto
server.port=8081

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_auth
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=

# JPA Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Clave secreta para firmar los tokens JWT (debe ser larga y segura)
jwt.secret=ZXN0YS1lcy1taS1jbGF2ZS1zZWNyZXRhLXN1cGVyLWxhcmdhLXBhcmEtcXVlLXNlYS1zZWd1cmEtMjAyNA==

# 24 horas en milisegundos
jwt.expiration=86400000

# SpringDoc OpenAPI (Swagger)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html 
