# Identificacion del servicio
spring.application.name=ms-10-evaluation-service

# Puerto donde corre este microservicio
server.port=8088

# Configuracion de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_evaluations
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - crea/actualiza tablas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Registro en Eureka para descubrimiento de servicios
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true