# Identificacion del servicio
spring.application.name=ms-09-progress-service

# Puerto donde corre este microservicio
server.port=8087

# Configuracion de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_progress
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate - create valida la tabla existe, update la crea si no existe
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Registro en Eureka para que otros servicios lo descubran
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true